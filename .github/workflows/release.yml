name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: incident-docket-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      tgz_sha256: ${{ steps.verify_release.outputs.tgz_sha256 }}
      setup_zip_sha256: ${{ steps.verify_release.outputs.setup_zip_sha256 }}
      checksums_sha256: ${{ steps.verify_release.outputs.checksums_sha256 }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # actions/setup-node v5.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Pack dry run
        run: npm pack --dry-run
      - name: Audit
        run: npm audit --omit=dev
      - name: Build release assets
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/build-release.ps1
      - name: Verify release assets and expose hashes
        id: verify_release
        shell: powershell
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $json = & powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $env:GITHUB_WORKSPACE 'scripts\verify-release-assets.ps1') -ReleaseDirectory $releaseDir
          if ($LASTEXITCODE -ne 0) { throw 'Release asset verification failed before artifact upload.' }
          $values = $json | ConvertFrom-Json
          foreach ($name in @('tgz_sha256', 'setup_zip_sha256', 'checksums_sha256')) {
            if ([string]$values.$name -notmatch '^[0-9A-Fa-f]{64}$') { throw "Invalid verification output: $name" }
            "$name=$($values.$name.ToUpperInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding ascii -Append
          }
      - name: Validate packed MCP
        shell: powershell
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP 'incident-docket-release-mcp-prefix'
          $storage = Join-Path $env:RUNNER_TEMP 'incident-docket-release-mcp-storage'
          New-Item -ItemType Directory -Path $prefix, $storage -Force | Out-Null
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          npm install --global --prefix $prefix (Join-Path $releaseDir 'incident-docket.tgz')
          if ($LASTEXITCODE -ne 0) { throw 'Packed MCP package installation failed.' }
          $entry = Join-Path $prefix 'node_modules\incident-docket\dist\index.js'
          & node (Join-Path $env:GITHUB_WORKSPACE 'scripts\test-packed-mcp.mjs') $entry $storage
          if ($LASTEXITCODE -ne 0) { throw 'Packed MCP smoke failed.' }
      - name: Validate installer in temporary npm prefix
        shell: powershell
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $setupRoot = Join-Path $env:RUNNER_TEMP 'incident-docket-setup-check'
          $prefix = Join-Path $env:RUNNER_TEMP 'incident-docket-installer-prefix'
          $work = Join-Path $env:RUNNER_TEMP 'incident-docket-installer-cwd'
          foreach ($path in @($setupRoot, $prefix, $work)) {
            if (Test-Path -LiteralPath $path) { Remove-Item -LiteralPath $path -Recurse -Force }
            New-Item -ItemType Directory -Path $path -Force | Out-Null
          }
          Expand-Archive -LiteralPath (Join-Path $releaseDir 'incident-docket-windows-setup.zip') -DestinationPath $setupRoot
          $before = @(Get-ChildItem -LiteralPath $work -Force | Select-Object -ExpandProperty Name)
          $env:npm_config_prefix = $prefix
          Push-Location -LiteralPath $work
          try {
            & powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $setupRoot 'install.ps1')
            if ($LASTEXITCODE -ne 0) { throw 'Installer returned a non-zero exit code.' }
          }
          finally {
            Pop-Location
          }
          $after = @(Get-ChildItem -LiteralPath $work -Force | Select-Object -ExpandProperty Name)
          if ($null -ne (Compare-Object -ReferenceObject $before -DifferenceObject $after)) { throw 'Installer created an artifact in its current working directory.' }
          $cli = Join-Path $prefix 'incident-docket.cmd'
          if (-not (Test-Path -LiteralPath $cli -PathType Leaf)) { throw 'Packed CLI was not installed in the temporary prefix.' }
          $demo = (& $cli demo --fixture gpu-driver-reset) -join "`n"
          if ($LASTEXITCODE -ne 0) { throw 'Packed fixture demo failed.' }
          if ($demo -match '(?i)alex|alex@example\.invalid|192\.0\.2\.10|fixture-access-token|S-1-5-21-|Ignore previous instructions|system prompt') { throw 'Fixture privacy value leaked.' }
      - name: Upload release assets
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # actions/upload-artifact v5.0.0
        with:
          name: incident-docket-release-assets
          if-no-files-found: error
          retention-days: 7
          path: |
            artifacts/release/incident-docket.tgz
            artifacts/release/incident-docket-windows-setup.zip
            artifacts/release/SHA256SUMS.txt

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5.0.1
        with:
          persist-credentials: false
      - name: Download release assets
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # actions/download-artifact v5.0.0
        with:
          name: incident-docket-release-assets
          path: artifacts/release
      - name: Verify downloaded release assets
        shell: powershell
        env:
          EXPECTED_TGZ_SHA256: ${{ needs.build.outputs.tgz_sha256 }}
          EXPECTED_SETUP_ZIP_SHA256: ${{ needs.build.outputs.setup_zip_sha256 }}
          EXPECTED_CHECKSUMS_SHA256: ${{ needs.build.outputs.checksums_sha256 }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $env:GITHUB_WORKSPACE 'scripts\verify-release-assets.ps1') -ReleaseDirectory $releaseDir -ExpectedTgzSha256 $env:EXPECTED_TGZ_SHA256 -ExpectedSetupZipSha256 $env:EXPECTED_SETUP_ZIP_SHA256 -ExpectedChecksumsSha256 $env:EXPECTED_CHECKSUMS_SHA256
          if ($LASTEXITCODE -ne 0) { throw 'Downloaded release asset verification failed; refusing to publish.' }
      - name: Validate tag and package version
        shell: powershell
        run: |
          $package = Get-Content -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'package.json') -Raw -Encoding UTF8 | ConvertFrom-Json
          $expectedRef = 'refs/tags/v' + [string]$package.version
          if ($env:GITHUB_REF -cne $expectedRef) { throw "Ref $($env:GITHUB_REF) does not match package version ref $expectedRef." }
          $tagCommit = (& git rev-parse --verify --quiet ($expectedRef + '^{commit}')).Trim()
          if ($LASTEXITCODE -ne 0 -or $tagCommit -notmatch '^[0-9a-fA-F]{40}$') { throw "Expected tag $expectedRef was not found." }
          $headCommit = (& git rev-parse --verify HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $headCommit -cne $tagCommit) { throw 'The checked-out commit is not the expected tag target.' }
      - name: Verify no existing GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File (Join-Path $env:GITHUB_WORKSPACE 'scripts\check-release-state.ps1') -Repository $env:GITHUB_REPOSITORY -Tag $env:GITHUB_REF_NAME
          if ($LASTEXITCODE -ne 0) { throw 'Existing or unverifiable GitHub Release state; refusing to publish.' }
      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notesPath = Join-Path $env:RUNNER_TEMP 'incident-docket-release-notes.md'
          @'
          ## Install

          - Windows setup ZIP is recommended for normal installation.
          - Direct `incident-docket.tgz` installation is available for manual or cross-platform fixture use.
          - Node.js 22 or later is required.
          - Codex MCP registration: `codex mcp add incident_docket -- incident-docket mcp`
          - Verify the SHA-256 values in `SHA256SUMS.txt`.

          Masking is not complete anonymization. Review output before sharing. Temporal proximity is not proof of causation.

          Verify the fixture with:

          ```powershell
          incident-docket demo --fixture gpu-driver-reset
          ```
          '@ | Set-Content -LiteralPath $notesPath -Encoding UTF8
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $assets = @(
            (Join-Path $releaseDir 'incident-docket.tgz'),
            (Join-Path $releaseDir 'incident-docket-windows-setup.zip'),
            (Join-Path $releaseDir 'SHA256SUMS.txt')
          )
          & gh release create $tag --repo $env:GITHUB_REPOSITORY --title $tag --notes-file $notesPath --verify-tag $assets
          if ($LASTEXITCODE -ne 0) { throw 'GitHub Release creation failed.' }
