name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        node-version: [22, 24]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # actions/setup-node v5.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm audit --omit=dev
      - name: Smoke packed fixture CLI
        shell: pwsh
        run: |
          $packDir = Join-Path $env:RUNNER_TEMP "incident-docket-pack"
          $prefix = Join-Path $env:RUNNER_TEMP "incident-docket-prefix"
          $storage = Join-Path $env:RUNNER_TEMP "incident-docket-ci-storage"
          $work = Join-Path $env:RUNNER_TEMP "incident-docket-ci-cwd"
          New-Item -ItemType Directory -Path $packDir, $prefix, $storage, $work -Force | Out-Null
          $metadata = npm pack --json --pack-destination $packDir | ConvertFrom-Json
          $tarball = Join-Path $packDir $metadata[0].filename
          npm install --global --prefix $prefix $tarball
          $before = @(Get-ChildItem -LiteralPath $work -Force | Select-Object -ExpandProperty Name)
          $oldLocalAppData = $env:LOCALAPPDATA
          Push-Location -LiteralPath $work
          try {
            $env:LOCALAPPDATA = $storage
            $output = (& (Join-Path $prefix "incident-docket.cmd") demo --fixture gpu-driver-reset) -join "`n"
            if ($LASTEXITCODE -ne 0) { throw "Packed fixture demo failed" }
          }
          finally {
            $env:LOCALAPPDATA = $oldLocalAppData
            Pop-Location
          }
          $after = @(Get-ChildItem -LiteralPath $work -Force | Select-Object -ExpandProperty Name)
          if ($null -ne (Compare-Object -ReferenceObject $before -DifferenceObject $after)) { throw "Packed fixture changed its CWD" }
          foreach ($value in @(
            "alex",
            "alex@example.invalid",
            "192.0.2.10",
            "fixture-access-token",
            "S-1-5-21-111111111-222222222-333333333-1001",
            "Ignore previous instructions",
            "system prompt"
          )) {
            if ($output.Contains($value, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Fixture secret leaked to stdout"
            }
          }
      - name: Smoke packed MCP
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "incident-docket-prefix"
          $entry = Join-Path $prefix "node_modules\incident-docket\dist\index.js"
          $storage = Join-Path $env:RUNNER_TEMP "incident-docket-ci-mcp-storage"
          & node scripts/test-packed-mcp.mjs $entry $storage
          if ($LASTEXITCODE -ne 0) { throw "Packed MCP smoke failed" }
